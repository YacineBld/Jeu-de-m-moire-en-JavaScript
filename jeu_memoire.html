<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Memory Game – Projet JavaScript</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d2e;
      --card-back: #1e2235;
      --accent: #f59e0b;
      --accent2: #fb923c;
      --text: #e2e8f0;
      --muted: #64748b;
      --matched: #22c55e;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background-image: radial-gradient(ellipse at 20% 20%, rgba(245,158,11,0.06) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 80%, rgba(251,146,60,0.06) 0%, transparent 50%);
    }

    header {
      text-align: center;
      margin-bottom: 28px;
    }

    header .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(245,158,11,0.1);
      border: 1px solid rgba(245,158,11,0.3);
      color: var(--accent);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 4px 12px;
      border-radius: 999px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }

    header p {
      font-size: 0.85rem;
      color: var(--muted);
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
    }

    .stat {
      background: var(--surface);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 10px 22px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .stat-label {
      font-size: 0.65rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 4px;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      max-width: 420px;
      width: 100%;
      margin-bottom: 24px;
    }

    .card {
      aspect-ratio: 1;
      cursor: pointer;
      perspective: 600px;
      border-radius: 12px;
    }

    .card-inner {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.4s ease;
      border-radius: 12px;
    }

    .card.flipped .card-inner,
    .card.matched .card-inner {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    .card-back {
      background: var(--card-back);
      border: 1px solid rgba(255,255,255,0.07);
      transition: background 0.2s;
    }

    .card:hover:not(.flipped):not(.matched) .card-back {
      background: #252840;
      border-color: rgba(245,158,11,0.25);
    }

    .card-back::after {
      content: '?';
      font-size: 1.4rem;
      font-weight: 800;
      color: rgba(245,158,11,0.3);
    }

    .card-front {
      background: var(--surface);
      border: 1px solid rgba(245,158,11,0.2);
      transform: rotateY(180deg);
    }

    .card.matched .card-front {
      background: rgba(34,197,94,0.1);
      border-color: rgba(34,197,94,0.4);
      box-shadow: 0 0 16px rgba(34,197,94,0.15);
    }

    /* Buttons */
    .actions {
      display: flex;
      gap: 10px;
    }

    button {
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      padding: 10px 22px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #0f1117;
    }

    .btn-primary:hover {
      opacity: 0.9;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(245,158,11,0.3);
    }

    .btn-secondary {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted);
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.08);
      color: var(--text);
    }

    /* Win overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .overlay.show { display: flex; }

    .win-box {
      background: var(--surface);
      border: 1px solid rgba(245,158,11,0.25);
      border-radius: 20px;
      padding: 36px 48px;
      text-align: center;
      box-shadow: 0 24px 60px rgba(0,0,0,0.5);
      animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes popIn {
      from { transform: scale(0.7); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .win-emoji { font-size: 3rem; margin-bottom: 12px; }
    .win-title {
      font-size: 1.6rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    .win-sub { color: var(--muted); font-size: 0.85rem; margin-bottom: 24px; }
    .win-stat { font-size: 2rem; font-weight: 800; color: var(--accent); }
    .win-stat-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 24px; }

    footer {
      margin-top: 28px;
      font-size: 0.7rem;
      color: var(--muted);
      text-align: center;
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }

    @media (max-width: 400px) {
      .grid { gap: 8px; }
    }
  </style>
</head>
<body>

  <header>
    <div class="badge">⚡ Projet JavaScript</div>
    <h1>Memory Game</h1>
    <p>Retrouvez toutes les paires de cartes !</p>
  </header>

  <div class="stats">
    <div class="stat">
      <div class="stat-value" id="moves">0</div>
      <div class="stat-label">Coups</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="pairs">0 / 8</div>
      <div class="stat-label">Paires</div>
    </div>
    <div class="stat">
      <div class="stat-value" id="timer">00:00</div>
      <div class="stat-label">Temps</div>
    </div>
  </div>

  <div class="grid" id="grid"></div>

  <div class="actions">
    <button class="btn-primary" onclick="initGame()">🔄 Nouvelle partie</button>
    <button class="btn-secondary" onclick="history.back()">← Retour</button>
  </div>

  <div class="overlay" id="overlay">
    <div class="win-box">
      <div class="win-emoji">🎉</div>
      <div class="win-title">Bravo !</div>
      <div class="win-sub">Vous avez trouvé toutes les paires</div>
      <div class="win-stat" id="win-moves"></div>
      <div class="win-stat-label">coups en <span id="win-time"></span></div>
      <button class="btn-primary" onclick="initGame(); document.getElementById('overlay').classList.remove('show')">Rejouer</button>
    </div>
  </div>

  <footer>
    Projet réalisé par <a href="/#certifications">Yacine Belaid</a> · Compétence JavaScript
  </footer>

  <script>
    const EMOJIS = ['🚀', '🎮', '🔥', '⚡', '🌊', '🎯', '💡', '🛡️'];

    let flipped = [];
    let matched = 0;
    let moves = 0;
    let locked = false;
    let timerInterval = null;
    let seconds = 0;

    function shuffle(arr) {
      return [...arr].sort(() => Math.random() - 0.5);
    }

    function formatTime(s) {
      const m = String(Math.floor(s / 60)).padStart(2, '0');
      const sec = String(s % 60).padStart(2, '0');
      return `${m}:${sec}`;
    }

    function startTimer() {
      clearInterval(timerInterval);
      seconds = 0;
      document.getElementById('timer').textContent = '00:00';
      timerInterval = setInterval(() => {
        seconds++;
        document.getElementById('timer').textContent = formatTime(seconds);
      }, 1000);
    }

    function initGame() {
      const grid = document.getElementById('grid');
      grid.innerHTML = '';
      flipped = [];
      matched = 0;
      moves = 0;
      locked = false;

      document.getElementById('moves').textContent = '0';
      document.getElementById('pairs').textContent = '0 / 8';
      startTimer();

      const cards = shuffle([...EMOJIS, ...EMOJIS]);

      cards.forEach((emoji, i) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.dataset.emoji = emoji;
        card.dataset.index = i;
        card.innerHTML = `
          <div class="card-inner">
            <div class="card-face card-back"></div>
            <div class="card-face card-front">${emoji}</div>
          </div>`;
        card.addEventListener('click', () => onCardClick(card));
        grid.appendChild(card);
      });
    }

    function onCardClick(card) {
      if (locked) return;
      if (card.classList.contains('flipped') || card.classList.contains('matched')) return;

      card.classList.add('flipped');
      flipped.push(card);

      if (flipped.length === 2) {
        locked = true;
        moves++;
        document.getElementById('moves').textContent = moves;

        const [a, b] = flipped;
        if (a.dataset.emoji === b.dataset.emoji) {
          // Match found
          setTimeout(() => {
            a.classList.add('matched');
            b.classList.add('matched');
            a.classList.remove('flipped');
            b.classList.remove('flipped');
            flipped = [];
            locked = false;
            matched++;
            document.getElementById('pairs').textContent = `${matched} / 8`;
            if (matched === 8) endGame();
          }, 400);
        } else {
          // No match
          setTimeout(() => {
            a.classList.remove('flipped');
            b.classList.remove('flipped');
            flipped = [];
            locked = false;
          }, 900);
        }
      }
    }

    function endGame() {
      clearInterval(timerInterval);
      document.getElementById('win-moves').textContent = moves;
      document.getElementById('win-time').textContent = formatTime(seconds);
      setTimeout(() => document.getElementById('overlay').classList.add('show'), 300);
    }

    initGame();
  </script>
</body>
</html>
